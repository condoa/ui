  <line x1="100" y1="165" x2="100" y2="200" stroke="currentColor" stroke-width="4" />

  <!-- Windows -->
  <!-- Floor 1 -->
  <rect x="55" y="130" width="18" height="22" stroke="currentColor" stroke-width="5" />
  <rect x="127" y="130" width="18" height="22" stroke="currentColor" stroke-width="5" />

  <!-- Floor 2 -->
  <rect x="55" y="98" width="18" height="22" stroke="currentColor" stroke-width="5" />
  <rect x="127" y="98" width="18" height="22" stroke="currentColor" stroke-width="5" />

  <!-- Floor 3 -->
  <rect x="55" y="66" width="18" height="22" stroke="currentColor" stroke-width="5" />
  <rect x="127" y="66" width="18" height="22" stroke="currentColor" stroke-width="5" />

  <!-- Small top details -->
  <rect x="92" y="48" width="16" height="12" stroke="currentColor" stroke-width="5" />
</svg>
